version: "3.9"

services:
  postgres:
    image: postgres:15-alpine
    container_name: mlforge_postgres
    environment:
      POSTGRES_USER: mlflow
      POSTGRES_PASSWORD: mlflow
      POSTGRES_DB: mlflow
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mlflow"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - mlforge_net

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.9.0
    container_name: mlforge_mlflow
    command: >
      mlflow server
      --host 0.0.0.0
      --port 5000
      --backend-store-uri postgresql://mlflow:mlflow@postgres:5432/mlflow
      --default-artifact-root /mlflow/artifacts
      --workers 2
    ports:
      - "5000:5000"
    volumes:
      - mlflow_artifacts:/mlflow/artifacts
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - mlflow/mlflow.env
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - mlforge_net

  redis:
    image: redis:7-alpine
    container_name: mlforge_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - mlforge_net

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mlforge_api
    ports:
      - "8000:8000"
    env_file:
      - .env.example
    environment:
      MLFLOW_TRACKING_URI: http://mlflow:5000
      REDIS_URL: redis://redis:6379
    depends_on:
      mlflow:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./data:/app/data
    networks:
      - mlforge_net
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    container_name: mlforge_prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.console.libraries=/usr/share/prometheus/console_libraries"
      - "--web.console.templates=/usr/share/prometheus/consoles"
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    depends_on:
      - api
    networks:
      - mlforge_net

  grafana:
    image: grafana/grafana:latest
    container_name: mlforge_grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboard.json:/var/lib/grafana/dashboards/mlforge.json:ro
    depends_on:
      - prometheus
    networks:
      - mlforge_net

networks:
  mlforge_net:
    driver: bridge

volumes:
  postgres_data:
  mlflow_artifacts:
  redis_data:
  prometheus_data:
  grafana_data:
